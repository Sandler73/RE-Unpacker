# =============================================================================
# re-unpacker -- Continuous Integration
#
# Synopsis
#   Lint, type-check, run the test suite across a Python version matrix on
#   Linux and Windows, and enforce the project-wide no-em-dash rule.
#
# Notes
#   The test suite is designed to pass without the external extraction
#   binaries installed; tool-dependent tests skip themselves when a binary is
#   absent. CI therefore does not provision the full toolset, keeping runs
#   fast while still exercising detection, registry, safety, and CLI layers.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --cov=re_unpacker --cov-report=term-missing

  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The test code is held to the lint standard strictly (blocking).
      - name: Ruff (tests, blocking)
        run: ruff check tests

      # The existing src/ carries a pre-existing lint / type backlog that
      # predates the repository scaffolding. These steps surface it as
      # information without blocking the pipeline, so it can be worked down
      # incrementally rather than in one large refactor of working code.
      - name: Ruff (src, informational)
        continue-on-error: true
        run: ruff check src

      - name: Mypy (src, informational)
        continue-on-error: true
        run: mypy src/re_unpacker

  em-dash-sweep:
    name: No em-dash (U+2014)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail on any em-dash in tracked text files
        shell: bash
        run: |
          # The em-dash character (U+2014) is forbidden anywhere in the repo.
          if grep -rlP "\x{2014}" \
              --include='*.py' --include='*.md' --include='*.toml' \
              --include='*.cfg' --include='*.ps1' --include='*.cmd' \
              --include='*.sh' --include='*.yml' --include='*.yaml' \
              --include='*.html' --include='*.txt' . ; then
            echo "::error::Em-dash (U+2014) found in the files listed above. Use --, -, :, or , instead."
            exit 1
          fi
          echo "No em-dash found."

  header-consistency:
    name: Header structure and version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Enforces that every module carries the full header skeleton, that each
      # header's version equals constants.VERSION, and that no comment,
      # docstring, or user-facing string reintroduces a release annotation
      # ("added in vX.Y.Z"). Version history belongs in CHANGELOG.md.
      - name: Enforce module header conventions
        run: python -m pytest tests/test_headers.py -q
